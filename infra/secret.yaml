# IMPORTANT: Do NOT commit real values to version control.
# Create this secret manually before deploying:
#
#   kubectl create secret generic job-pipeline-secrets \
#     --namespace=job-pipeline \
#     --from-literal=rapidapi-key=YOUR_KEY_HERE
#
# Or apply this file after base64-encoding your values:
#   echo -n "YOUR_KEY_HERE" | base64

apiVersion: v1
kind: Secret
metadata:
  name: job-pipeline-secrets
  namespace: job-pipeline
type: Opaque
data:
  rapidapi-key: <BASE64_ENCODED_KEY>   # replace before applying
